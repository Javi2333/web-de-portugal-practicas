<head>

  <style>
    .account-page {
      min-height: 100vh;
      background: var(--dark);
      padding: 110px 24px 80px;
    }
    .account-container {
      max-width: 640px;
      margin: 0 auto;
    }
    .account-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    .account-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; color: var(--white);
      flex-shrink: 0;
    }
    .account-header-info h1 {
      font-size: 1.4rem; font-weight: 800; color: var(--white); margin-bottom: 4px;
    }
    .account-header-info p { font-size: 0.88rem; color: var(--text-muted); }
    .account-card {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      margin-bottom: 20px;
      position: relative;
    }
    .account-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      border-radius: 0 0 2px 2px;
    }
    .account-card-title {
      font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px;
    }
    .account-field { margin-bottom: 16px; }
    .account-field label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 6px;
    }
    .account-field .field-value {
      font-size: 0.95rem; color: var(--white);
      padding: 12px 16px;
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .account-field input {
      width: 100%;
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--white);
      font-size: 0.93rem;
      font-family: inherit;
      transition: var(--transition);
      box-sizing: border-box;
    }
    .account-field input::placeholder { color: var(--text-muted); }
    .account-field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,102,255,0.12); }
    .account-field input:disabled { opacity: 0.5; cursor: not-allowed; }
    .account-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .btn-account-save {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none; border-radius: var(--radius-sm);
      padding: 12px 24px; color: var(--white);
      font-size: 0.9rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: var(--transition);
    }
    .btn-account-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,102,255,0.3); }
    .btn-account-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-account-edit {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 24px; color: var(--text-muted);
      font-size: 0.9rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: var(--transition);
    }
    .btn-account-edit:hover { background: var(--glass-hover); color: var(--white); border-color: var(--primary); }
    .btn-account-logout {
      display: flex; align-items: center; gap: 10px;
      background: none; border: 1px solid rgba(255,68,68,0.25);
      border-radius: var(--radius-sm);
      padding: 12px 24px; color: #ff6b6b;
      font-size: 0.9rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: var(--transition); width: 100%;
    }
    .btn-account-logout:hover { background: rgba(255,68,68,0.08); border-color: #ff6b6b; }
    .account-msg {
      font-size: 0.85rem; text-align: center; padding: 10px 14px;
      border-radius: var(--radius-sm); margin-top: 12px; display: none;
    }
    .account-msg.success { background: rgba(0,200,100,0.1); color: #00c864; border: 1px solid rgba(0,200,100,0.25); }
    .account-msg.error   { background: rgba(255,68,68,0.1);  color: #ff6666; border: 1px solid rgba(255,68,68,0.25); }
    .account-skeleton { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @media (max-width: 480px) {
      .account-card { padding: 24px 18px; }
      .account-header { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

      </button>
      <div class="nav-user-wrap" id="navUserWrap">

        </button>
        <div class="nav-user-dropdown" id="navUserDropdown">

            Iniciar Sesión
          </a>

      <a href="contacto.html" class="btn btn-primary btn-small">Pedir Presupuesto</a>

  </nav>

  <div class="account-page">
    <div class="account-container">

      <div class="account-header">
        <div class="account-avatar" id="accountAvatar">?</div>
        <div class="account-header-info">
          <h1 id="accountDisplayName">Cargando…</h1>
          <p id="accountDisplayEmail"></p>
        </div>
      </div>

      <!-- Datos personales -->
      <div class="account-card">
        <p class="account-card-title">Datos personales</p>

        <div id="viewMode">
          <div class="account-field">
            <label>Nombre completo</label>
            <div class="field-value account-skeleton" id="viewName">&nbsp;</div>
          </div>
          <div class="account-field">
            <label>Email</label>
            <div class="field-value account-skeleton" id="viewEmail">&nbsp;</div>
          </div>
          <div class="account-field">
            <label>Teléfono</label>
            <div class="field-value account-skeleton" id="viewPhone">&nbsp;</div>
          </div>
          <div class="account-actions">
            <button class="btn-account-edit" onclick="showEditMode()">Editar datos</button>
          </div>
        </div>

        <div id="editMode" style="display:none">
          <div class="account-field">
            <label for="editName">Nombre completo</label>
            <input type="text" id="editName" placeholder="Tu nombre completo"/>
          </div>
          <div class="account-field">
            <label>Email</label>
            <div class="field-value" id="editEmailDisplay" style="color:var(--text-muted);font-size:0.88rem"></div>
          </div>
          <div class="account-field">
            <label for="editPhone">Teléfono</label>
            <input type="tel" id="editPhone" placeholder="+34 600 000 000"/>
          </div>
          <div class="account-actions">
            <button class="btn-account-save" id="saveBtn" onclick="saveProfile()">Guardar cambios</button>
            <button class="btn-account-edit" onclick="showViewMode()">Cancelar</button>
          </div>
          <div class="account-msg" id="editMsg"></div>
        </div>
      </div>

      <!-- Cerrar sesión -->
      <div class="account-card">
        <p class="account-card-title">Sesión</p>
        <button class="btn-account-logout" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar sesión
        </button>
      </div>

    </div>
  </div>

  <script src="main.js"></script>
  <script>
  (function () {
    const SB_URL = 'https://jnztchhwexxfjlrfgcvy.supabase.co/rest/v1';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuenRjaGh3ZXh4ZmpscmZnY3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDc2MTYsImV4cCI6MjA5MzYyMzYxNn0.6Ihq0BrTmcodWGpegdpcCi3MT3K6MnPj7lgIN6HnSE8';

    let _session = null;
    let _profile = null;

    function getSession() {
      try { return JSON.parse(sessionStorage.getItem('sb_session')); } catch { return null; }
    }

    function sbHeaders(token) {
      return { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    }

    function showMsg(msg, type) {
      const el = document.getElementById('editMsg');
      el.textContent = msg;
      el.className = 'account-msg ' + type;
      el.style.display = 'block';
    }

    function renderProfile(profile, email) {
      const name = profile.full_name || '';
      const phone = profile.phone || '';
      const initial = name ? name.charAt(0).toUpperCase() : email.charAt(0).toUpperCase();

      document.getElementById('accountAvatar').textContent = initial;
      document.getElementById('accountDisplayName').textContent = name || email;
      document.getElementById('accountDisplayEmail').textContent = email;

      document.getElementById('viewName').textContent  = name  || '—';
      document.getElementById('viewEmail').textContent = email || '—';
      document.getElementById('viewPhone').textContent = phone || '—';
      document.getElementById('viewName').classList.remove('account-skeleton');
      document.getElementById('viewEmail').classList.remove('account-skeleton');
      document.getElementById('viewPhone').classList.remove('account-skeleton');
    }

    window.showEditMode = function () {
      document.getElementById('viewMode').style.display = 'none';
      document.getElementById('editMode').style.display = 'block';
      document.getElementById('editName').value  = _profile?.full_name || '';
      document.getElementById('editPhone').value = _profile?.phone || '';
      document.getElementById('editEmailDisplay').textContent = _session.user.email;
      document.getElementById('editMsg').style.display = 'none';
    };

    window.showViewMode = function () {
      document.getElementById('editMode').style.display = 'none';
      document.getElementById('viewMode').style.display = 'block';
    };

    window.saveProfile = async function () {
      const name  = document.getElementById('editName').value.trim();
      const phone = document.getElementById('editPhone').value.trim();
      const btn   = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Guardando…';

      try {
        const res = await fetch(`${SB_URL}/profiles?id=eq.${_session.user.id}`, {
          method: 'PATCH',
          headers: { ...sbHeaders(_session.access_token), 'Prefer': 'return=representation' },
          body: JSON.stringify({ full_name: name || null, phone: phone || null })
        });
        if (!res.ok) throw new Error('No se pudieron guardar los cambios.');
        _profile.full_name = name;
        _profile.phone     = phone;
        renderProfile(_profile, _session.user.email);
        showViewMode();
        showMsg('Datos actualizados correctamente.', 'success');
        document.getElementById('viewMode').querySelector('.account-msg') ?.remove();
      } catch (err) {
        showMsg(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar cambios';
      }
    };

    window.logout = function () {
      sessionStorage.removeItem('sb_session');
      window.location.href = 'index.html';
    };

    async function init() {
      _session = getSession();
      if (!_session || !_session.access_token) {
        window.location.href = 'login.html?next=mi-cuenta';
        return;
      }

      try {
        const res = await fetch(`${SB_URL}/profiles?id=eq.${_session.user.id}&limit=1`, {
          headers: sbHeaders(_session.access_token)
        });
        const rows = res.ok ? await res.json() : [];
        _profile = rows[0] || { full_name: '', phone: '' };
        renderProfile(_profile, _session.user.email);
      } catch {
        document.getElementById('accountDisplayName').textContent = _session.user.email;
      }
    }

    init();
  })();
  </script>
</body>
</html>
