<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    .auth-page {
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      position: relative;
      overflow: hidden;
    }

    .auth-page::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(0, 102, 255, 0.13) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-card {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      position: relative;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
      border-radius: 0 0 2px 2px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .auth-logo .logo-stack span {
      font-size: 0.7rem;
    }

    .auth-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--white);
      text-align: center;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .auth-field input {
      width: 100%;
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      color: var(--white);
      font-size: 0.93rem;
      font-family: inherit;
      transition: var(--transition);
      box-sizing: border-box;
    }

    .auth-field input::placeholder {
      color: var(--text-muted);
    }

    .auth-field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.15);
    }

    .auth-forgot {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
    }

    .auth-forgot a {
      font-size: 0.82rem;
      color: var(--primary-light);
      transition: var(--transition);
    }

    .auth-forgot a:hover {
      color: var(--accent);
    }

    .auth-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), #0056e0);
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      color: var(--white);
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.02em;
      margin-top: 6px;
    }

    .auth-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 102, 255, 0.4);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }

    .auth-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-divider span {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .auth-social {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .auth-social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
    }

    .auth-social-btn:hover {
      background: var(--glass-hover);
      border-color: rgba(0, 102, 255, 0.3);
      color: var(--white);
    }

    .auth-footer {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 24px;
    }

    .auth-footer a {
      color: var(--primary-light);
      font-weight: 600;
      transition: var(--transition);
    }

    .auth-footer a:hover {
      color: var(--accent);
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 22px;
      }
    }
  </style>
</head>

<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html" class="nav-logo">
          <div class="logo-svg" style="width:32px;height:32px">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" width="32" height="32">
              <circle cx="12" cy="12" r="10" stroke="var(--text-muted)" />
              <ellipse cx="12" cy="12" rx="4" ry="10" stroke="var(--primary)" />
              <line x1="2" y1="12" x2="22" y2="12" stroke="var(--primary)" />
            </svg>
          </div>
          <div class="logo-stack"><span>LEDS</span><span>PARATODOS</span><span>.COM</span></div>
        </a>
      </div>
      <h1 class="auth-title">Bienvenido de nuevo</h1>
      <p class="auth-subtitle">Inicia sesión para gestionar tus pedidos y productos favoritos</p>
      <form class="auth-form" onsubmit="return false">
        <div class="auth-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="tu@email.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label for="loginPass">Contraseña</label>
          <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="auth-forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>
        <button type="submit" class="auth-submit">Iniciar Sesión</button>
        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <span>o continúa con</span>
          <div class="auth-divider-line"></div>
        </div>
        <div class="auth-social">
          <button type="button" class="auth-social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4"
                d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z" />
              <path fill="#34A853"
                d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.565 24 12.255 24z" />
              <path fill="#FBBC05"
                d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z" />
              <path fill="#EA4335"
                d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.69 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z" />
            </svg>
            Google
          </button>
          <button type="button" class="auth-social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z" />
            </svg>
            Facebook

  <script src="main.js"></script>
  <script>
  (function () {
    const SB_BASE = 'https://jnztchhwexxfjlrfgcvy.supabase.co';
    const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuenRjaGh3ZXh4ZmpscmZnY3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDc2MTYsImV4cCI6MjA5MzYyMzYxNn0.6Ihq0BrTmcodWGpegdpcCi3MT3K6MnPj7lgIN6HnSE8';

    function showLoginError(msg) {
      let el = document.getElementById('loginError');
      if (!el) {
        el = document.createElement('p');
        el.id = 'loginError';
        el.style.cssText = 'color:#ff6666;font-size:0.85rem;text-align:center;margin-top:-6px;';
        document.querySelector('.auth-submit').before(el);
      }
      el.textContent = msg;
    }

    document.querySelector('.auth-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPass').value;
      const btn      = document.querySelector('.auth-submit');

      if (!email || !password) { showLoginError('Introduce email y contraseña.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Entrando…';
      const errEl = document.getElementById('loginError');
      if (errEl) errEl.textContent = '';

      try {
        // 1. Autenticar con Supabase
        const authRes = await fetch(SB_BASE + '/auth/v1/token?grant_type=password', {
          method:  'POST',
          headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });

        if (!authRes.ok) {
          const err = await authRes.json().catch(() => ({}));
          throw new Error(err.error_description || err.msg || 'Email o contraseña incorrectos');
        }

        const session = await authRes.json();
        // Guardar sesión
        sessionStorage.setItem('sb_session', JSON.stringify({
          access_token:  session.access_token,
          refresh_token: session.refresh_token,
          user: { id: session.user.id, email: session.user.email }
        }));

        // 2. Comprobar/crear perfil
        let role = 'customer';
        try {
          const profRes = await fetch(SB_BASE + '/rest/v1/profiles?id=eq.' + session.user.id + '&select=role&limit=1', {
            headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + session.access_token }
          });
          if (profRes.ok) {
            const profiles = await profRes.json();
            if (profiles.length) {
              role = profiles[0].role;
            } else {
              // Primera vez que inicia sesión — crear perfil (viene de registro con confirmación email)
              const pending = JSON.parse(sessionStorage.getItem('sb_pending_profile') || 'null');
              await fetch(SB_BASE + '/rest/v1/profiles', {
                method:  'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + session.access_token, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({
                  id:        session.user.id,
                  email:     session.user.email,
                  full_name: pending?.full_name || '',
                  phone:     pending?.phone || null,
                  role:      'customer'
                })
              });
              sessionStorage.removeItem('sb_pending_profile');
            }
          }
        } catch (_) {}

        // 3. Redirigir
        const params = new URLSearchParams(window.location.search);
        if (role === 'admin') {
          window.location.href = 'admin/index.html';
        } else if (params.get('next') === 'admin') {
          showLoginError('No tienes permisos de administrador.');
          sessionStorage.removeItem('sb_session');
          btn.disabled = false;
          btn.textContent = 'Iniciar Sesión';
        } else {
          window.location.href = 'index.html';
        }

      } catch (err) {
        showLoginError(err.message);
        btn.disabled    = false;
        btn.textContent = 'Iniciar Sesión';
      }
    });
  })();
  </script>
</body>
