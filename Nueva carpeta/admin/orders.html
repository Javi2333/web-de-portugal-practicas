<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pedidos — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div id="adminLoading" class="admin-loading">
  <div class="admin-spinner"></div> Cargando…
</div>

<div id="adminApp" class="admin-layout" style="display:none">
  <div class="admin-sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <button class="sidebar-toggle-btn" onclick="openSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="admin-page-title">Pedidos</span>
      </div>
    </div>

    <div class="admin-content">
      <div class="admin-filters">
        <input type="search" class="admin-search" id="orderSearch" placeholder="Buscar por ID…" oninput="filterOrders()"/>
        <select class="admin-select" id="statusFilter" onchange="loadOrders()">
          <option value="">Todos los estados</option>
          <option value="pending">Pendiente</option>
          <option value="processing">Procesando</option>
          <option value="shipped">Enviado</option>
          <option value="delivered">Entregado</option>
          <option value="cancelled">Cancelado</option>
        </select>
      </div>

      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Pedido #</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
let _allOrders = [];

document.addEventListener('DOMContentLoaded', async () => {
  renderSidebar('orders');
  const ok = await checkAdminAuth();
  if (!ok) return;
  document.getElementById('adminLoading').style.display = 'none';
  document.getElementById('adminApp').style.display = 'flex';
  await loadOrders();
});

async function loadOrders() {
  const status = document.getElementById('statusFilter').value;
  const tbody = document.getElementById('ordersBody');
  tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">Cargando…</td></tr>`;
  try {
    _allOrders = await adminGetOrders(status) || [];
    filterOrders();
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" style="padding:24px;text-align:center;color:#ff6666">Error: ${e.message}</td></tr>`;
  }
}

function filterOrders() {
  const q = document.getElementById('orderSearch').value.toLowerCase();
  const filtered = q ? _allOrders.filter(o => String(o.id).includes(q)) : _allOrders;
  renderOrdersTable(filtered);
}

function renderOrdersTable(orders) {
  const tbody = document.getElementById('ordersBody');
  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="admin-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
      <p>Sin pedidos</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td class="text-bold">#${o.id}</td>
      <td class="text-muted">${o.user_id ? o.user_id.substring(0,8) + '…' : '—'}</td>
      <td class="text-muted">${fmtDate(o.created_at)}</td>
      <td class="text-bold">${fmtPrice(o.total)}</td>
      <td>${orderBadge(o.status)}</td>
      <td>
        <div class="cell-actions">
          <button class="btn-admin btn-admin-ghost btn-icon" onclick="openOrderDetail(${o.id})" title="Ver detalle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button class="btn-admin btn-admin-ghost btn-icon" onclick="openChangeStatus(${o.id}, '${o.status}')" title="Cambiar estado">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </td>
    </tr>`).join('');
}

async function openOrderDetail(id) {
  let items = [];
  try { items = await adminGetOrderItems(id) || []; } catch(e) {}
  const order = _allOrders.find(o => o.id === id);

  showModal('Pedido #' + id, `
    <div style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap">
      <div><span class="form-label">Estado</span><br>${orderBadge(order?.status)}</div>
      <div><span class="form-label">Total</span><br><strong>${fmtPrice(order?.total)}</strong></div>
      <div><span class="form-label">Fecha</span><br>${fmtDate(order?.created_at)}</div>
    </div>
    ${order?.notes ? `<div class="form-group"><label class="form-label">Notas</label><p style="font-size:0.85rem;color:var(--text-muted)">${order.notes}</p></div>` : ''}
    <label class="form-label">Líneas de pedido</label>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr><th>Producto</th><th>Cant.</th><th>P. unitario</th><th>Subtotal</th></tr></thead>
        <tbody>
          ${items.length ? items.map(i => `
            <tr>
              <td>${i.product_title || ('Producto #' + i.product_id)}</td>
              <td>${i.quantity}</td>
              <td>${fmtPrice(i.unit_price)}</td>
              <td>${fmtPrice((i.quantity || 0) * (i.unit_price || 0))}</td>
            </tr>`).join('') :
            `<tr><td colspan="4" style="text-align:center;padding:16px;color:var(--text-muted)">Sin líneas de pedido</td></tr>`}
        </tbody>
      </table>
    </div>`,
    null
  );
  document.getElementById('modalSaveBtn').style.display = 'none';
}

function openChangeStatus(orderId, currentStatus) {
  const statusOptions = Object.entries(ORDER_STATUS).map(([val, s]) =>
    `<option value="${val}" ${val === currentStatus ? 'selected' : ''}>${s.label}</option>`).join('');

  showModal('Cambiar estado del pedido #' + orderId, `
    <div class="form-group">
      <label class="form-label">Nuevo estado</label>
      <select class="form-select" id="newStatus">${statusOptions}</select>
    </div>`,
    async () => {
      const status = document.getElementById('newStatus').value;
      try {
        await adminUpdateOrderStatus(orderId, status);
        showToast('Estado actualizado', 'success');
        closeModal();
        await loadOrders();
      } catch(e) { showToast('Error: ' + e.message, 'error'); }
    }
  );
}
</script>
</body>
</html>
