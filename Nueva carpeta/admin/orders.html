<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pedidos — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div id="adminLoading" class="admin-loading">
  <div class="admin-spinner"></div> Cargando…
</div>

<div id="adminApp" class="admin-layout" style="display:none">
  <div class="admin-sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <button class="sidebar-toggle-btn" onclick="openSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="admin-page-title">Pedidos</span>
      </div>
    </div>

    <div class="admin-content">
      <div class="admin-filters">
        <input type="search" class="admin-search" id="orderSearch" placeholder="Buscar por referencia o email…" oninput="filterOrders()"/>
        <select class="admin-select" id="statusFilter" onchange="loadOrders()">
          <option value="">Todos los estados</option>
          <option value="pending">Pendiente</option>
          <option value="processing">Procesando</option>
          <option value="shipped">Enviado</option>
          <option value="delivered">Entregado</option>
          <option value="cancelled">Cancelado</option>
        </select>
      </div>

      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Referencia</th>
                <th>Cliente</th>
                <th>Email</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal de seguimiento -->
<div id="trackingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:none;align-items:center;justify-content:center;padding:24px">
  <div style="background:var(--dark-3);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:90vh;overflow-y:auto">
    <div class="modal-header" style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)">
      <span class="modal-title" id="trackingModalTitle">Enviar seguimiento</span>
      <button class="modal-close-btn" onclick="closeTrackingModal()">✕</button>
    </div>
    <div style="padding:24px">
      <!-- Datos del pedido (solo lectura) -->
      <div style="background:var(--dark-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.83rem">
          <div><span style="color:var(--text-muted);display:block;font-size:0.73rem;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px">Referencia</span><strong id="trkRef" style="color:var(--white)">—</strong></div>
          <div><span style="color:var(--text-muted);display:block;font-size:0.73rem;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px">Total</span><strong id="trkTotal" style="color:var(--white)">—</strong></div>
          <div><span style="color:var(--text-muted);display:block;font-size:0.73rem;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px">Cliente</span><span id="trkName" style="color:var(--text)">—</span></div>
          <div><span style="color:var(--text-muted);display:block;font-size:0.73rem;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px">Email</span><span id="trkEmail" style="color:var(--text)">—</span></div>
        </div>
      </div>

      <!-- Formulario de seguimiento -->
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Empresa de transporte</label>
        <input class="form-input" id="trkCarrier" placeholder="Ej: Correos, MRW, SEUR, DHL…"/>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Número de seguimiento</label>
        <input class="form-input" id="trkNumber" placeholder="Ej: ES123456789ES"/>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">URL de seguimiento</label>
        <input class="form-input" id="trkUrl" type="url" placeholder="https://www.correos.es/seguimiento?tracking=…"/>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label">Mensaje adicional (opcional)</label>
        <textarea class="form-input" id="trkMessage" rows="3" placeholder="Ej: El paquete saldrá esta tarde…" style="resize:vertical;min-height:72px"></textarea>
      </div>

      <div id="trkMsg" style="display:none;font-size:0.84rem;padding:10px 14px;border-radius:8px;margin-bottom:14px"></div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-admin btn-admin-ghost" onclick="closeTrackingModal()" style="flex:1">Cancelar</button>
        <button class="btn-admin btn-admin-ghost" id="trkSaveBtn" onclick="saveTracking(false)" style="flex:1">Guardar</button>
        <button class="btn-admin btn-admin-primary" id="trkSendBtn" onclick="saveTracking(true)" style="flex:2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Guardar y enviar email
        </button>
      </div>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
let _allOrders = [];
let _currentTrackingOrder = null;

document.addEventListener('DOMContentLoaded', async () => {
  renderSidebar('orders');
  const ok = await checkAdminAuth();
  if (!ok) return;
  document.getElementById('adminLoading').style.display = 'none';
  document.getElementById('adminApp').style.display = 'flex';
  await loadOrders();
});

async function loadOrders() {
  const status = document.getElementById('statusFilter').value;
  const tbody = document.getElementById('ordersBody');
  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Cargando…</td></tr>`;
  try {
    _allOrders = await adminGetOrders(status) || [];
    filterOrders();
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7" style="padding:24px;text-align:center;color:#ff6666">Error: ${e.message}</td></tr>`;
  }
}

function filterOrders() {
  const q = document.getElementById('orderSearch').value.toLowerCase();
  const filtered = q
    ? _allOrders.filter(o =>
        String(o.id).includes(q) ||
        (o.order_reference || '').toLowerCase().includes(q) ||
        (o.customer_email  || '').toLowerCase().includes(q) ||
        (o.customer_name   || '').toLowerCase().includes(q))
    : _allOrders;
  renderOrdersTable(filtered);
}

function renderOrdersTable(orders) {
  const tbody = document.getElementById('ordersBody');
  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="admin-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
      <p>Sin pedidos</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td class="text-bold">${o.order_reference || ('#' + o.id)}</td>
      <td>${o.customer_name || '<span class="text-muted">—</span>'}</td>
      <td class="text-muted" style="font-size:0.83rem">${o.customer_email || '—'}</td>
      <td class="text-muted">${fmtDate(o.created_at)}</td>
      <td class="text-bold">${fmtPrice(o.total)}</td>
      <td>${orderBadge(o.status)}</td>
      <td>
        <div class="cell-actions">
          <button class="btn-admin btn-admin-ghost btn-icon" onclick="window.location.href='order-detail.html?id=${o.id}'" title="Ver detalle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button class="btn-admin btn-admin-ghost btn-icon" onclick="openTrackingModal(${o.id})" title="Enviar seguimiento" style="color:var(--accent)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
          <button class="btn-admin btn-admin-ghost btn-icon" onclick="openChangeStatus(${o.id}, '${o.status}')" title="Cambiar estado">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </td>
    </tr>`).join('');
}

async function openOrderDetail(orderId) {
  const order = _allOrders.find(o => o.id === orderId);
  if (!order) return;

  const ref = order.order_reference || ('#' + orderId);

  // 1. Abrir modal INMEDIATAMENTE con pantalla de carga
  showModal('Pedido ' + ref,
    '<div id="orderDetailBody" style="text-align:center;padding:40px;color:var(--text-muted)">Cargando productos…</div>',
    null
  );
  document.getElementById('modalSaveBtn').style.display = 'none';

  // 2. Pedir los productos al servidor en segundo plano
  let items = [];
  let fetchError = null;
  try {
    items = await adminGetOrderItems(orderId) || [];
  } catch (e) {
    fetchError = e.message;
    console.error('Error cargando productos:', e);
  }

  // Si el usuario cerr\xf3 el modal mientras cargaba, salir
  const body = document.getElementById('orderDetailBody');
  if (!body) return;

  const subtotal = parseFloat(order.subtotal)      || 0;
  const shipping = parseFloat(order.shipping_cost) || 0;

  var html = '';

  // Info cliente
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;font-size:0.87rem">';
  html += '<div><div class="form-label">Estado</div>'    + orderBadge(order.status) + '</div>';
  html += '<div><div class="form-label">Fecha</div><span class="text-muted">' + fmtDate(order.created_at) + '</span></div>';
  html += '<div><div class="form-label">Nombre</div>'   + (order.customer_name  || '<span class="text-muted">—</span>') + '</div>';
  html += '<div><div class="form-label">Email</div><span class="text-muted" style="font-size:0.81rem">' + (order.customer_email || '—') + '</span></div>';
  if (order.customer_phone) html += '<div><div class="form-label">Tel\xe9fono</div>' + order.customer_phone + '</div>';
  html += '</div>';
  if (order.notes) {
    html += '<div style="background:var(--dark-2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:0.83rem;color:var(--text-muted)">'
          + '<strong style="color:var(--white)">Nota:</strong> ' + order.notes + '</div>';
  }

  // Tabla de productos
  html += '<div class="admin-table-wrap"><table class="admin-table">';
  html += '<thead><tr><th>Producto</th><th style="text-align:center">Cant.</th>'
        + '<th style="text-align:right">Precio unit.</th><th style="text-align:right">Total</th></tr></thead>';
  html += '<tbody>';

  if (fetchError) {
    html += '<tr><td colspan="4" style="padding:16px;color:#ff6666;text-align:center">Error: ' + fetchError + '</td></tr>';
  } else if (items.length === 0) {
    html += '<tr><td colspan="4" style="padding:20px;text-align:center;color:var(--text-muted)">Sin productos registrados</td></tr>';
  } else {
    for (var n = 0; n < items.length; n++) {
      var it        = items[n];
      var itTitle   = it.product_title || ('Producto #' + it.product_id);
      var itVariant = it.variant_label ? '<br><small style="color:var(--text-muted)">' + it.variant_label + '</small>' : '';
      var itTotal   = it.total_price != null ? it.total_price : (it.quantity * it.unit_price);
      html += '<tr>'
            + '<td><strong>' + itTitle + '</strong>' + itVariant + '</td>'
            + '<td style="text-align:center">' + it.quantity + '</td>'
            + '<td style="text-align:right">' + fmtPrice(it.unit_price) + '</td>'
            + '<td style="text-align:right;font-weight:700">' + fmtPrice(itTotal) + '</td>'
            + '</tr>';
    }
  }

  html += '</tbody><tfoot>';
  if (subtotal > 0) {
    html += '<tr><td colspan="3" style="text-align:right;color:var(--text-muted);padding:6px 14px;font-size:0.83rem">Subtotal</td>'
          + '<td style="text-align:right;padding:6px 14px">' + fmtPrice(subtotal) + '</td></tr>';
  }
  html += '<tr><td colspan="3" style="text-align:right;color:var(--text-muted);padding:6px 14px;font-size:0.83rem">Env\xedo</td>'
        + '<td style="text-align:right;padding:6px 14px;' + (shipping > 0 ? '' : 'color:#22c55e;font-weight:600') + '">'
        + (shipping > 0 ? fmtPrice(shipping) : 'Gratis') + '</td></tr>';
  html += '<tr style="background:rgba(0,102,255,0.07)">'
        + '<td colspan="3" style="text-align:right;font-weight:700;padding:10px 14px">TOTAL</td>'
        + '<td style="text-align:right;font-weight:800;font-size:1.05rem;padding:10px 14px;color:var(--primary-light)">'
        + fmtPrice(order.total) + '</td></tr>';
  html += '</tfoot></table></div>';

  body.innerHTML = html;
}

function openChangeStatus(orderId, currentStatus) {
  const statusOptions = Object.entries(ORDER_STATUS).map(([val, s]) =>
    `<option value="${val}" ${val === currentStatus ? 'selected' : ''}>${s.label}</option>`).join('');

  showModal('Cambiar estado — pedido #' + orderId, `
    <div class="form-group">
      <label class="form-label">Nuevo estado</label>
      <select class="form-select" id="newStatus">${statusOptions}</select>
    </div>`,
    async () => {
      const status = document.getElementById('newStatus').value;
      try {
        await adminUpdateOrderStatus(orderId, status);
        showToast('Estado actualizado', 'success');
        closeModal();
        await loadOrders();
      } catch(e) { showToast('Error: ' + e.message, 'error'); }
    }
  );
}

// ── Modal de seguimiento ──────────────────────────────────────────

async function openTrackingModal(orderId) {
  const order = _allOrders.find(o => o.id === orderId);
  if (!order) return;
  _currentTrackingOrder = order;

  document.getElementById('trackingModalTitle').textContent =
    'Seguimiento — ' + (order.order_reference || '#' + orderId);
  document.getElementById('trkRef').textContent   = order.order_reference || ('#' + orderId);
  document.getElementById('trkTotal').textContent = fmtPrice(order.total);
  document.getElementById('trkName').textContent  = order.customer_name  || '—';
  document.getElementById('trkEmail').textContent = order.customer_email || '—';

  // Limpiar campos
  document.getElementById('trkCarrier').value = '';
  document.getElementById('trkNumber').value  = '';
  document.getElementById('trkUrl').value     = '';
  document.getElementById('trkMessage').value = '';
  document.getElementById('trkMsg').style.display = 'none';

  // Pre-rellenar si ya hay un envío
  try {
    const sh = await adminGetShipmentByOrderId(orderId);
    if (sh) {
      document.getElementById('trkCarrier').value = sh.carrier        || '';
      document.getElementById('trkNumber').value  = sh.tracking_number || '';
      document.getElementById('trkUrl').value     = sh.tracking_url   || '';
    }
  } catch(e) {}

  const overlay = document.getElementById('trackingOverlay');
  overlay.style.display = 'flex';
}

function closeTrackingModal() {
  document.getElementById('trackingOverlay').style.display = 'none';
  _currentTrackingOrder = null;
}

function showTrkMsg(msg, isError) {
  const el = document.getElementById('trkMsg');
  el.textContent = msg;
  el.style.background = isError ? 'rgba(255,68,68,0.1)' : 'rgba(0,200,100,0.1)';
  el.style.color  = isError ? '#ff6666' : '#00c864';
  el.style.border = isError ? '1px solid rgba(255,68,68,0.25)' : '1px solid rgba(0,200,100,0.25)';
  el.style.display = 'block';
}

async function saveTracking(sendEmail) {
  if (!_currentTrackingOrder) return;

  const carrier  = document.getElementById('trkCarrier').value.trim();
  const tracking = document.getElementById('trkNumber').value.trim();
  const url      = document.getElementById('trkUrl').value.trim();
  const message  = document.getElementById('trkMessage').value.trim();
  const orderId  = _currentTrackingOrder.id;

  if (!carrier || !tracking) {
    showTrkMsg('Rellena al menos la empresa de transporte y el número de seguimiento.', true);
    return;
  }
  if (sendEmail && !_currentTrackingOrder.customer_email) {
    showTrkMsg('Este pedido no tiene email de cliente. No se puede enviar el correo.', true);
    return;
  }

  const saveBtn = document.getElementById('trkSaveBtn');
  const sendBtn = document.getElementById('trkSendBtn');
  saveBtn.disabled = sendBtn.disabled = true;

  try {
    // 1. Guardar/actualizar envío en Supabase
    await adminUpsertShipment(orderId, {
      carrier,
      tracking_number: tracking,
      tracking_url:    url      || null,
      shipping_status: 'shipped',
      shipped_at:      new Date().toISOString()
    });

    // 2. Si hay que enviar email, llamar al servidor
    if (sendEmail) {
      await adminSendTrackingEmail({
        orderId,
        to:             _currentTrackingOrder.customer_email,
        customerName:   _currentTrackingOrder.customer_name  || '',
        orderReference: _currentTrackingOrder.order_reference || ('#' + orderId),
        carrier,
        trackingNumber: tracking,
        trackingUrl:    url || null,
        message:        message || null
      });
      showTrkMsg('✓ Seguimiento guardado y email enviado al cliente.', false);
    } else {
      showTrkMsg('✓ Seguimiento guardado correctamente.', false);
    }

    // Actualizar estado del pedido a "shipped" (internamente)
    try { await adminUpdateOrderStatus(orderId, 'shipped'); } catch(e) {}
    await loadOrders();

  } catch(err) {
    showTrkMsg(err.message, true);
  } finally {
    saveBtn.disabled = sendBtn.disabled = false;
  }
}
</script>
</body>
</html>
