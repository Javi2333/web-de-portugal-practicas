<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle Pedido — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>

<div id="adminLoading" class="admin-loading">
  <div class="admin-spinner"></div> Cargando…
</div>

<div id="adminApp" class="admin-layout" style="display:none">
  <div class="admin-sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <button class="sidebar-toggle-btn" onclick="openSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <a href="orders.html" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;display:flex;align-items:center;gap:6px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Volver a pedidos
        </a>
        <span class="admin-page-title" id="pageTitle">Detalle del pedido</span>
      </div>
    </div>

    <div class="admin-content" id="adminContent">
      <p style="color:var(--text-muted);text-align:center;padding:60px">Cargando…</p>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  renderSidebar('orders');
  const ok = await checkAdminAuth();
  if (!ok) return;
  document.getElementById('adminLoading').style.display = 'none';
  document.getElementById('adminApp').style.display = 'flex';
  await loadDetail();
});

async function loadDetail() {
  const params  = new URLSearchParams(window.location.search);
  const orderId = params.get('id');

  if (!orderId) {
    document.getElementById('adminContent').innerHTML =
      '<p style="color:#ff6666;padding:40px;text-align:center">No se indicó ningún pedido.</p>';
    return;
  }

  try {
    // Cargar pedido y sus productos en paralelo
    const [orderRows, items] = await Promise.all([
      _sbFetch('/orders?id=eq.' + orderId + '&select=*&limit=1'),
      fetchOrderItems(orderId)
    ]);

    const order = orderRows && orderRows[0];
    if (!order) {
      document.getElementById('adminContent').innerHTML =
        '<p style="color:#ff6666;padding:40px;text-align:center">Pedido no encontrado.</p>';
      return;
    }

    document.getElementById('pageTitle').textContent = 'Pedido ' + (order.order_reference || '#' + orderId);
    renderDetail(order, items);

  } catch (e) {
    document.getElementById('adminContent').innerHTML =
      '<p style="color:#ff6666;padding:40px;text-align:center">Error: ' + e.message + '</p>';
  }
}

async function fetchOrderItems(orderId) {
  const session = _getSession();
  const res = await fetch('/api/order-items/' + orderId, {
    headers: { 'Authorization': 'Bearer ' + (session ? session.access_token : '') }
  });
  if (!res.ok) {
    const d = await res.json().catch(() => ({}));
    throw new Error(d.error || 'Error ' + res.status);
  }
  return res.json();
}

function renderDetail(order, items) {
  const subtotal = parseFloat(order.subtotal)      || 0;
  const shipping = parseFloat(order.shipping_cost) || 0;
  const total    = parseFloat(order.total)         || 0;

  let itemRows = '';
  if (!items || items.length === 0) {
    itemRows = '<tr><td colspan="4" style="padding:24px;text-align:center;color:var(--text-muted)">Sin productos registrados para este pedido</td></tr>';
  } else {
    for (const it of items) {
      const title   = it.product_title || ('Producto #' + it.product_id);
      const variant = it.variant_label
        ? '<div style="font-size:0.78rem;color:var(--text-muted);margin-top:2px">' + it.variant_label + '</div>'
        : '';
      const lineTotal = it.total_price != null ? it.total_price : (it.quantity * it.unit_price);
      itemRows += '<tr>'
        + '<td><strong>' + title + '</strong>' + variant + '</td>'
        + '<td style="text-align:center;font-weight:600">' + it.quantity + '</td>'
        + '<td style="text-align:right">' + fmtPrice(it.unit_price) + '</td>'
        + '<td style="text-align:right;font-weight:700">' + fmtPrice(lineTotal) + '</td>'
        + '</tr>';
    }
  }

  document.getElementById('adminContent').innerHTML = `
    <div style="max-width:860px">

      <!-- Cabecera -->
      <div class="admin-card" style="margin-bottom:1.5rem;padding:24px 28px">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px">
          <div>
            <div class="form-label">Referencia</div>
            <div style="font-size:1rem;font-weight:700;color:var(--white)">${order.order_reference || ('#' + order.id)}</div>
          </div>
          <div>
            <div class="form-label">Estado</div>
            ${orderBadge(order.status)}
          </div>
          <div>
            <div class="form-label">Fecha</div>
            <div style="color:var(--text)">${fmtDate(order.created_at)}</div>
          </div>
          <div>
            <div class="form-label">Total</div>
            <div style="font-size:1.1rem;font-weight:800;color:var(--primary-light)">${fmtPrice(total)}</div>
          </div>
        </div>
      </div>

      <!-- Datos del cliente -->
      <div class="admin-card" style="margin-bottom:1.5rem;padding:24px 28px">
        <div style="font-size:0.8rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px">Cliente</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">
          <div>
            <div class="form-label">Nombre</div>
            <div style="color:var(--white)">${order.customer_name || '—'}</div>
          </div>
          <div>
            <div class="form-label">Email</div>
            <div style="color:var(--text)">${order.customer_email || '—'}</div>
          </div>
          ${order.customer_phone ? `<div><div class="form-label">Teléfono</div><div style="color:var(--text)">${order.customer_phone}</div></div>` : ''}
        </div>
        ${order.notes ? `<div style="margin-top:16px;padding:12px 16px;background:var(--dark-2);border-radius:6px;font-size:0.85rem;color:var(--text-muted)"><strong style="color:var(--white)">Nota:</strong> ${order.notes}</div>` : ''}
      </div>

      <!-- Productos -->
      <div class="admin-card" style="padding:0;overflow:hidden">
        <div style="padding:20px 28px 12px;font-size:0.8rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em">
          Productos del pedido
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Producto</th>
                <th style="text-align:center">Cantidad</th>
                <th style="text-align:right">Precio unitario</th>
                <th style="text-align:right">Total</th>
              </tr>
            </thead>
            <tbody>${itemRows}</tbody>
            <tfoot>
              ${subtotal > 0 ? `<tr>
                <td colspan="3" style="text-align:right;color:var(--text-muted);padding:8px 16px">Subtotal</td>
                <td style="text-align:right;padding:8px 16px">${fmtPrice(subtotal)}</td>
              </tr>` : ''}
              <tr>
                <td colspan="3" style="text-align:right;color:var(--text-muted);padding:8px 16px">Envío</td>
                <td style="text-align:right;padding:8px 16px;${shipping > 0 ? '' : 'color:#22c55e;font-weight:600'}">${shipping > 0 ? fmtPrice(shipping) : 'Gratis'}</td>
              </tr>
              <tr style="background:rgba(0,102,255,0.08)">
                <td colspan="3" style="text-align:right;font-weight:700;padding:14px 16px;font-size:0.95rem">TOTAL</td>
                <td style="text-align:right;font-weight:800;font-size:1.15rem;padding:14px 16px;color:var(--primary-light)">${fmtPrice(total)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      <!-- Acciones -->
      <div style="display:flex;gap:12px;margin-top:1.5rem;flex-wrap:wrap">
        <button class="btn-admin btn-admin-ghost" onclick="history.back()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Volver
        </button>
        <button class="btn-admin btn-admin-primary" onclick="window.location.href='tracking-form.html?id=${order.id}'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Enviar seguimiento al cliente
        </button>
      </div>

    </div>`;
}
</script>
</body>
</html>
